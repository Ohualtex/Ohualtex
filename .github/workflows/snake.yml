name: Generate Contribution Snake

on:
  # Run every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Run on every push to main (and the rewrite branch, to generate the snake early)
  push:
    branches:
      - main
      - rewrite_v1

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#7aa2f7&color_dots=#c0caf5,#7dcfff,#7aa2f7,#bb9af7,#9d7cd8
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#7aa2f7&color_dots=#1a1b27,#3b4261,#7dcfff,#7aa2f7,#bb9af7

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
